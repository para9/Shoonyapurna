<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Type — Mono</title>
<style>
.card { padding: 26px 28px; }
.row { display: flex; gap: 10px; align-items: center; padding: 8px 0; border-bottom: 1px solid rgba(200,169,110,0.06); }
.row:last-child { border: none; }
.spec { font-family: 'Space Mono', monospace; text-transform: uppercase; color: #c8a96e; flex: 1; }
.desc { font-family: 'Space Mono', monospace; font-size: 8px; letter-spacing: 1.5px; color: #8a7d6a; text-transform: uppercase; }
</style></head><body>
<div class="card">
  <div class="eyebrow" style="margin-bottom: 14px;">Mono Labels · Space Mono, uppercase, wide tracking</div>
  <div class="row"><div class="spec" style="font-size:10px;letter-spacing:3px">SERVICES · ABOUT · CONTACT</div><div class="desc">10 / +3</div></div>
  <div class="row"><div class="spec" style="font-size:9px;letter-spacing:4px">WHAT WE DO</div><div class="desc">9 / +4 · eyebrow</div></div>
  <div class="row"><div class="spec" style="font-size:9px;letter-spacing:2px;color:rgba(245,240,232,0.6)">EARLY ACCESS PLATFORM</div><div class="desc">9 / +2 · paper-60</div></div>
  <div class="row"><div class="spec" style="font-size:8px;letter-spacing:2px">FULL NAME *</div><div class="desc">8 / +2 · form label</div></div>
  <div class="row"><div class="spec" style="font-size:8px;letter-spacing:1.5px;color:#8a7d6a">© 2026 SHOONYAPURNA. ALL RIGHTS RESERVED.</div><div class="desc">8 / +1.5 · footer</div></div>
  <div class="row"><div class="spec" style="font-size:7px;letter-spacing:1.5px">LAW · FINANCE · MEDIA</div><div class="desc">7 / +1.5 · orbit</div></div>
</div>
</body></html>
