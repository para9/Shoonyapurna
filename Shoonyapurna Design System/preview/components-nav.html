<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Nav</title>
<style>
.card { padding: 0; background: #0a0a0a; }
.nav { display: flex; align-items: center; justify-content: space-between; padding: 14px 22px; background: linear-gradient(to bottom, rgba(10,10,10,0.95), rgba(10,10,10,0.7)); border-bottom: 1px solid rgba(200,169,110,0.08); backdrop-filter: blur(8px); }
.logo { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; color: #c8a96e; letter-spacing: -1px; text-decoration: none; }
.logo span { color: #f5f0e8; font-weight: 300; font-style: italic; font-family: 'Cormorant Garamond', serif; margin-left: 2px; }
.links { display: flex; gap: 22px; list-style: none; padding: 0; margin: 0; }
.links a { font-family: 'Space Mono', monospace; font-size: 8px; letter-spacing: 2px; text-transform: uppercase; color: rgba(245,240,232,0.6); text-decoration: none; }
.links a.on { color: #c8a96e; }
.badge { font-family: 'Space Mono', monospace; font-size: 7px; letter-spacing: 1.5px; padding: 5px 12px; border: 1px solid #1a3a5c; background: rgba(26,58,92,0.4); color: #9dc5e8; text-transform: uppercase; border-radius: 2px; }
.badge::before { content: '⬡ '; }
.banner { text-align: center; padding: 8px 14px; font-size: 8px; letter-spacing: 2px; font-family: 'Space Mono', monospace; background: rgba(200,169,110,0.1); color: #e8d5a3; border-bottom: 1px solid rgba(200,169,110,0.25); text-transform: uppercase; }
.pad { padding: 22px; }
</style></head><body>
<div class="card">
  <div class="pad" style="padding-bottom:0;"><div class="eyebrow">Navigation · fixed top, gradient + blur</div></div>
  <div style="margin-top:14px;"></div>
  <div class="nav">
    <a class="logo">0<span>Shoonyapurna</span></a>
    <ul class="links"><li><a class="on">Services</a></li><li><a>Free Tools</a></li><li><a>About</a></li><li><a>Waitlist</a></li><li><a>Contact</a></li></ul>
    <div class="badge">In-House AI</div>
  </div>
  <div class="banner">🚧 Platform Launching Soon — Limited Access · Early Access &amp; Enterprise Queries Only</div>
</div>
</body></html>
