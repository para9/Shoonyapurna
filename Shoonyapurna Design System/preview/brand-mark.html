<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Brand Mark</title>
<style>
.card { padding: 20px 28px; display: flex; align-items: center; gap: 32px; }
.mark-hero {
  width: 180px; height: 180px; position: relative;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.orbit { position: absolute; border-radius: 50%; border: 1px solid rgba(200,169,110,0.18); top: 50%; left: 50%; transform: translate(-50%,-50%); }
.o1 { width: 130px; height: 130px; }
.o2 { width: 160px; height: 160px; border-style: dashed; }
.o3 { width: 180px; height: 180px; border-color: rgba(200,169,110,0.08); }
.dot { position: absolute; width: 5px; height: 5px; border-radius: 50%; background: #c8a96e; box-shadow: 0 0 10px #c8a96e; top: -2px; left: 50%; transform: translateX(-50%); }
.zero {
  font-family: 'Syne', sans-serif; font-size: 78px; font-weight: 800;
  color: transparent; -webkit-text-stroke: 1.5px #c8a96e;
  letter-spacing: -4px; line-height: 1; position: relative; z-index: 3;
  text-shadow: 0 0 40px rgba(200,169,110,0.2);
}
.body { display: flex; flex-direction: column; gap: 6px; }
.brand { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 800; color: #c8a96e; letter-spacing: -1px; }
.brand em { font-family: 'Cormorant Garamond', serif; font-style: italic; font-weight: 300; color: #f5f0e8; margin-left: 2px; }
.tagline { font-family: 'Space Mono', monospace; font-size: 9px; letter-spacing: 4px; text-transform: uppercase; color: #e8d5a3; opacity: 0.8; }
.caption { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 14px; color: rgba(245,240,232,0.7); margin-top: 4px; }
</style></head><body>
<div class="card">
  <div class="mark-hero">
    <div class="orbit o3"></div>
    <div class="orbit o2"><div class="dot"></div></div>
    <div class="orbit o1"><div class="dot"></div></div>
    <div class="zero">0</div>
  </div>
  <div class="body">
    <div class="brand">0<em>Shoonyapurna</em></div>
    <div class="tagline">ZERO · INFINITE POSSIBILITIES</div>
    <div class="caption">The mark is the zero — outlined gold stroke, pulse-glow, orbited by three rings rotating at 18s / 28s / 40s.</div>
  </div>
</div>
</body></html>
