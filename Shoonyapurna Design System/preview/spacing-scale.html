<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Spacing Scale</title>
<style>
.card { padding: 24px 28px; }
.row { display: grid; grid-template-columns: 50px 1fr 120px; gap: 14px; align-items: center; padding: 6px 0; }
.token { font-family: 'Space Mono', monospace; font-size: 9px; color: #c8a96e; letter-spacing: 1px; text-transform: uppercase; }
.bar { height: 12px; background: linear-gradient(to right, #c8a96e, rgba(200,169,110,0.15)); }
.val { font-family: 'Space Mono', monospace; font-size: 8px; letter-spacing: 1.5px; color: #8a7d6a; text-transform: uppercase; text-align: right; }
</style></head><body>
<div class="card">
  <div class="eyebrow" style="margin-bottom: 12px;">Spacing Scale · 4px baseline</div>
  <div class="row"><div class="token">1</div><div class="bar" style="width:4px"></div><div class="val">4px · inline gap</div></div>
  <div class="row"><div class="token">2</div><div class="bar" style="width:8px"></div><div class="val">8px · chip gap</div></div>
  <div class="row"><div class="token">4</div><div class="bar" style="width:16px"></div><div class="val">16px · form row</div></div>
  <div class="row"><div class="token">6</div><div class="bar" style="width:24px"></div><div class="val">24px · card inner</div></div>
  <div class="row"><div class="token">8</div><div class="bar" style="width:32px"></div><div class="val">32px · card pad</div></div>
  <div class="row"><div class="token">12</div><div class="bar" style="width:48px"></div><div class="val">48px · section X</div></div>
  <div class="row"><div class="token">20</div><div class="bar" style="width:80px"></div><div class="val">80px · grid gap</div></div>
  <div class="row"><div class="token">24</div><div class="bar" style="width:100px"></div><div class="val">100px · section Y</div></div>
</div>
</body></html>
