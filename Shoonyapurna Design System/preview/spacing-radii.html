<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Radii & Borders</title>
<style>
.card { padding: 24px 28px; }
.grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-top: 10px; }
.demo { aspect-ratio: 1.2; border: 1px solid rgba(200,169,110,0.25); background: rgba(255,255,255,0.03); display: flex; align-items: center; justify-content: center; font-family: 'Space Mono', monospace; font-size: 9px; color: #c8a96e; letter-spacing: 1.5px; text-transform: uppercase; }
.circle { border-radius: 50%; }
.lbl { font-family: 'Space Mono', monospace; font-size: 8px; letter-spacing: 1.5px; color: #8a7d6a; text-transform: uppercase; margin-top: 6px; text-align: center; }
.border-row { display: flex; gap: 18px; margin-top: 20px; align-items: center; }
.bd { width: 80px; height: 38px; background: rgba(255,255,255,0.03); }
.bd1 { border: 1px solid rgba(200,169,110,0.4); }
.bd2 { border: 1px dashed rgba(200,169,110,0.25); }
.bd3 { border: 1px solid rgba(200,169,110,0.08); }
</style></head><body>
<div class="card">
  <div class="eyebrow" style="margin-bottom: 10px;">Radii & Borders · sharp default, 1px gold</div>
  <div class="grid">
    <div><div class="demo" style="border-radius:0">0</div><div class="lbl">sharp · rare</div></div>
    <div><div class="demo" style="border-radius:2px">2</div><div class="lbl">--radius · default</div></div>
    <div><div class="demo" style="border-radius:20px">pill</div><div class="lbl">tag / badge</div></div>
    <div><div class="demo circle">full</div><div class="lbl">FAB · avatar</div></div>
  </div>
  <div class="border-row">
    <div class="bd bd1"></div><div class="lbl" style="margin:0">solid 40%</div>
    <div class="bd bd2"></div><div class="lbl" style="margin:0">dashed 25%</div>
    <div class="bd bd3"></div><div class="lbl" style="margin:0">faint 8%</div>
  </div>
</div>
</body></html>
