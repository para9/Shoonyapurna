<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Backgrounds</title>
<style>
.card { padding: 20px 22px; }
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
.tile { aspect-ratio: 2.2; border: 1px solid rgba(200,169,110,0.12); display: flex; align-items: flex-end; padding: 12px; }
.lbl { font-family: 'Space Mono', monospace; font-size: 7px; letter-spacing: 1.5px; color: #e8d5a3; text-transform: uppercase; }
.t1 { background: radial-gradient(ellipse at 50% 60%, #1a2a3a 0%, #0a0a0a 70%); }
.t2 { background: linear-gradient(135deg, rgba(26,58,92,0.3), rgba(139,38,53,0.15)), #0a0a0a; }
.t3 { background: linear-gradient(135deg, rgba(26,58,92,0.15), rgba(200,169,110,0.08)), #0a0a0a; }
.t4 { background: #0a0a0a; position: relative; }
.t4::before { content: ''; position: absolute; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.18'/%3E%3C/svg%3E"); opacity: 0.6; }
.t4 .lbl { position: relative; z-index: 2; }
</style></head><body>
<div class="card">
  <div class="eyebrow">Backgrounds · gradients + noise</div>
  <div class="grid">
    <div class="tile t1"><span class="lbl">Hero · radial navy→ink</span></div>
    <div class="tile t2"><span class="lbl">Features · navy×burgundy 135°</span></div>
    <div class="tile t3"><span class="lbl">Waitlist · navy×gold 135°</span></div>
    <div class="tile t4"><span class="lbl">Paper noise · SVG turbulence</span></div>
  </div>
</div>
</body></html>
