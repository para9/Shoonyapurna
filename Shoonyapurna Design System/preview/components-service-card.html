<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Service Card</title>
<style>
.card { padding: 20px 22px; }
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: rgba(200,169,110,0.12); border: 1px solid rgba(200,169,110,0.12); margin-top: 10px; }
.sc { background: #0a0a0a; padding: 22px 20px; }
.sc.ai { background: rgba(26,58,92,0.08); }
.ic { font-size: 22px; display: block; margin-bottom: 10px; filter: grayscale(0.3); }
.nm { font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: #e8d5a3; margin-bottom: 8px; }
.ds { font-family: 'Cormorant Garamond', serif; font-size: 14px; line-height: 1.6; color: rgba(245,240,232,0.75); }
.tg { display: inline-block; margin-top: 10px; font-family: 'Space Mono', monospace; font-size: 7px; letter-spacing: 2px; text-transform: uppercase; color: #c8a96e; opacity: 0.7; }
.free { background: rgba(139,38,53,0.2); border: 1px solid rgba(139,38,53,0.4); color: #e88a96; padding: 2px 8px; border-radius: 20px; font-size: 7px; font-family: 'Space Mono', monospace; letter-spacing: 1.5px; text-transform: uppercase; margin-left: 6px; }
</style></head><body>
<div class="card">
  <div class="eyebrow" style="margin-bottom: 8px;">Service Cards · 1px gold grid, no per-card border</div>
  <div class="grid">
    <div class="sc"><span class="ic">⚖️</span><div class="nm">Legal Intelligence</div><div class="ds">Corporate law, contracts, compliance & litigation.</div><span class="tg">Consulting</span></div>
    <div class="sc ai"><span class="ic">🤖</span><div class="nm">In-House AI <span class="free">Powered</span></div><div class="ds">Domain-aware AI assistant embedded across every service.</div><span class="tg">Shoonyapurna AI</span></div>
  </div>
</div>
</body></html>
