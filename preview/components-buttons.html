<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Buttons</title>
<style>
.card { padding: 24px 28px; }
.row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 16px; }
.btn { font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 3px; text-transform: uppercase; padding: 12px 26px; border: 1px solid #c8a96e; background: transparent; color: #c8a96e; cursor: pointer; text-decoration: none; display: inline-block; }
.btn.filled { background: #c8a96e; color: #0a0a0a; }
.btn.hover { background: #c8a96e; color: #0a0a0a; }
.btn.filled.hover { background: transparent; color: #c8a96e; }
.lbl { font-family: 'Space Mono', monospace; font-size: 8px; letter-spacing: 2px; color: #8a7d6a; text-transform: uppercase; margin-bottom: 10px; }
</style></head><body>
<div class="card">
  <div class="eyebrow" style="margin-bottom: 12px;">Buttons · outline ↔ filled invert on hover</div>
  <div class="lbl">Outline</div>
  <div class="row">
    <a class="btn">Our Services</a>
    <a class="btn hover">Our Services · hover</a>
  </div>
  <div class="lbl">Filled</div>
  <div class="row">
    <a class="btn filled">Request Early Access</a>
    <a class="btn filled hover">Request Early Access · hover</a>
    <a class="btn filled">Submit Interest →</a>
  </div>
</div>
</body></html>
