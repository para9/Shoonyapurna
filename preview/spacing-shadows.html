<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Shadows & Glow</title>
<style>
.card { padding: 26px 28px; }
.grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 18px; margin-top: 10px; }
.tile { aspect-ratio: 1.4; background: #0d0d0d; border: 1px solid rgba(200,169,110,0.1); display: flex; align-items: center; justify-content: center; }
.zero-glow { font-family: 'Syne', sans-serif; font-size: 44px; font-weight: 800; color: transparent; -webkit-text-stroke: 1.5px #c8a96e; letter-spacing: -2px; text-shadow: 0 0 40px rgba(200,169,110,0.5), 0 0 80px rgba(200,169,110,0.15); }
.dot { width: 10px; height: 10px; border-radius: 50%; background: #c8a96e; box-shadow: 0 0 10px #c8a96e; }
.fab { width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(135deg, #1a3a5c, #2a5a8c); border: 1px solid rgba(200,169,110,0.3); color: #c8a96e; font-family: 'Syne', sans-serif; font-weight: 800; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 32px rgba(26,58,92,0.5); }
.lbl { margin-top: 8px; font-family: 'Space Mono', monospace; font-size: 8px; letter-spacing: 1.5px; color: #8a7d6a; text-transform: uppercase; text-align: center; }
</style></head><body>
<div class="card">
  <div class="eyebrow" style="margin-bottom: 10px;">Shadows & Glow · gold halos, navy FAB drop</div>
  <div class="grid">
    <div><div class="tile"><div class="zero-glow">0</div></div><div class="lbl">Glow gold · text-shadow</div></div>
    <div><div class="tile"><div class="dot"></div></div><div class="lbl">Dot glow · 0 0 10px</div></div>
    <div><div class="tile"><div class="fab">0</div></div><div class="lbl">FAB · 0 8 32 navy 0.5</div></div>
  </div>
</div>
</body></html>
