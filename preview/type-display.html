<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Type — Display</title>
<style>
.card { padding: 30px 32px; }
.specimen { font-family: 'Cormorant Garamond', serif; color: #f5f0e8; font-weight: 300; letter-spacing: 1px; line-height: 1.15; font-size: 48px; }
.specimen em { font-style: italic; color: #e8d5a3; }
.meta { margin-top: 18px; display: flex; gap: 18px; }
.meta-item { font-family: 'Space Mono', monospace; font-size: 8px; letter-spacing: 2px; text-transform: uppercase; color: #8a7d6a; }
.meta-item strong { color: #c8a96e; font-weight: 400; display: block; margin-top: 2px; }
</style></head><body>
<div class="card">
  <div class="eyebrow" style="margin-bottom: 16px;">Display · Cormorant Garamond 300 + italic accent</div>
  <div class="specimen">Zero. <em>Infinite</em> Possibilities.</div>
  <div class="meta">
    <div class="meta-item">Family<strong>Cormorant Garamond</strong></div>
    <div class="meta-item">Weight<strong>300 / italic 300</strong></div>
    <div class="meta-item">Tracking<strong>+2px</strong></div>
    <div class="meta-item">Italic fill<strong>#E8D5A3</strong></div>
  </div>
</div>
</body></html>
