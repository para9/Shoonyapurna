<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Logo Lockups</title>
<style>
.card { padding: 22px 26px; }
.grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 10px; }
.tile { border: 1px solid rgba(200,169,110,0.12); padding: 22px 16px; display: flex; flex-direction: column; align-items: center; gap: 12px; background: #0a0a0a; }
.tile .lbl { font-family: 'Space Mono', monospace; font-size: 7px; letter-spacing: 2px; text-transform: uppercase; color: #8a7d6a; }
.wm-row { display: flex; align-items: baseline; gap: 2px; }
.wm-zero { font-family: 'Syne', sans-serif; font-weight: 800; color: #c8a96e; font-size: 22px; letter-spacing: -1px; }
.wm-name { font-family: 'Cormorant Garamond', serif; font-style: italic; font-weight: 300; color: #f5f0e8; font-size: 22px; }
.outline-zero { font-family: 'Syne', sans-serif; font-size: 60px; font-weight: 800; color: transparent; -webkit-text-stroke: 1.5px #c8a96e; letter-spacing: -2px; }
.solid-zero { font-family: 'Syne', sans-serif; font-size: 60px; font-weight: 800; color: #c8a96e; letter-spacing: -2px; }
</style></head><body>
<div class="card">
  <div class="eyebrow" style="margin-bottom: 10px;">Logo Lockups · three variants</div>
  <div class="grid">
    <div class="tile"><div class="outline-zero">0</div><div class="lbl">Outline · hero</div></div>
    <div class="tile"><div class="solid-zero">0</div><div class="lbl">Solid · footer / FAB</div></div>
    <div class="tile"><div class="wm-row"><div class="wm-zero">0</div><div class="wm-name">Shoonyapurna</div></div><div class="lbl">Wordmark · nav</div></div>
  </div>
</div>
</body></html>
