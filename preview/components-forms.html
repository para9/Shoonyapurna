<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Form Fields</title>
<style>
.card { padding: 24px 28px; }
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 12px; }
.group { display: flex; flex-direction: column; gap: 6px; }
.group label { font-family: 'Space Mono', monospace; font-size: 8px; letter-spacing: 2px; text-transform: uppercase; color: rgba(245,240,232,0.6); }
.group input, .group select { background: rgba(255,255,255,0.04); border: 1px solid rgba(200,169,110,0.2); color: #f5f0e8; padding: 11px 14px; font-family: 'Cormorant Garamond', serif; font-size: 14px; outline: none; border-radius: 2px; }
.group input::placeholder { color: rgba(245,240,232,0.3); }
.group.focus input { border-color: rgba(200,169,110,0.5); background: rgba(255,255,255,0.06); }
.tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
.tag { font-family: 'Space Mono', monospace; font-size: 8px; letter-spacing: 1.5px; padding: 6px 12px; border: 1px solid rgba(200,169,110,0.2); color: rgba(245,240,232,0.55); text-transform: uppercase; }
.tag.sel { border-color: #c8a96e; color: #c8a96e; background: rgba(200,169,110,0.07); }
</style></head><body>
<div class="card">
  <div class="eyebrow" style="margin-bottom: 8px;">Form Fields · input / select / focus / tags</div>
  <div class="grid">
    <div class="group"><label>Full Name *</label><input placeholder="Your full name"/></div>
    <div class="group focus"><label>Work Email *</label><input value="you@organisation.com"/></div>
  </div>
  <div class="tags" style="margin-top: 16px;">
    <span class="tag sel">Legal Intelligence</span>
    <span class="tag sel">Media Intelligence</span>
    <span class="tag">Financial Services</span>
    <span class="tag">Survey & Research</span>
    <span class="tag">Software Development</span>
  </div>
</div>
</body></html>
