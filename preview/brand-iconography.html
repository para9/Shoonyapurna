<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Iconography</title>
<style>
.card { padding: 22px 26px; }
.row { display: grid; grid-template-columns: repeat(8, 1fr); gap: 8px; margin-top: 10px; }
.tile {
  aspect-ratio: 1;
  border: 1px solid rgba(200,169,110,0.18);
  display: flex; align-items: center; justify-content: center;
  position: relative;
  background: radial-gradient(circle at center, rgba(200,169,110,0.04), transparent 70%);
}
.tile svg { width: 56%; height: 56%; stroke: #c8a96e; fill: none; stroke-width: 1.2; stroke-linecap: round; stroke-linejoin: round; }
.tile .rupee {
  font-family: 'Cormorant Garamond', serif;
  font-size: 28px; font-weight: 400; color: #d4b478;
  font-style: italic;
}
.tile.featured { border-color: rgba(200,169,110,0.55); background: radial-gradient(circle at center, rgba(200,169,110,0.14), transparent 75%); }
.tile.uni { font-family: 'Cormorant Garamond', serif; color: #c8a96e; font-size: 22px; }

/* Ambient animations — subtle so set still feels editorial */
.tile svg.spin { animation: icn-spin 14s linear infinite; transform-origin: center; }
.tile svg.pulse { animation: icn-pulse 2.8s ease-in-out infinite; transform-origin: center; }
.tile svg.draw { stroke-dasharray: 120; stroke-dashoffset: 120; animation: icn-draw 3.2s ease-in-out infinite; }
.tile svg.bob { animation: icn-bob 3.4s ease-in-out infinite; transform-origin: center; }
.tile svg.tilt { animation: icn-tilt 4s ease-in-out infinite; transform-origin: center; }
.tile .rupee { animation: icn-pulse 2.6s ease-in-out infinite; }
.tile.featured::after {
  content:''; position:absolute; inset:-1px; border:1px solid rgba(200,169,110,0.3);
  animation: icn-halo 2.6s ease-in-out infinite;
}
@keyframes icn-spin { to { transform: rotate(360deg); } }
@keyframes icn-pulse { 0%,100% { opacity: .55; transform: scale(1); } 50% { opacity: 1; transform: scale(1.08); } }
@keyframes icn-draw { 0% { stroke-dashoffset: 120; } 50% { stroke-dashoffset: 0; } 100% { stroke-dashoffset: -120; } }
@keyframes icn-bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-2px); } }
@keyframes icn-tilt { 0%,100% { transform: rotate(-6deg); } 50% { transform: rotate(6deg); } }
@keyframes icn-halo { 0%,100% { opacity: 0; transform: scale(1); } 50% { opacity: .8; transform: scale(1.04); } }

.note { font-family: 'Space Mono', monospace; font-size: 8px; letter-spacing: 1.5px; color: #8a7d6a; text-transform: uppercase; margin-top: 14px; text-align: center; line-height: 1.7; }
.note span { color: #c8a96e; }
</style></head><body>
<div class="card">
  <div class="eyebrow">Iconography · gold hairline · ambient motion</div>

  <!-- Row 1: Service glyphs, with rupee featured for finance -->
  <div class="row">
    <!-- Law · scales -->
    <div class="tile" title="Law">
      <svg viewBox="0 0 24 24" class="tilt"><path d="M12 3v18"/><path d="M6 21h12"/><path d="M4 8h16"/><path d="M8 8l-3 6a3 3 0 0 0 6 0z"/><path d="M16 8l-3 6a3 3 0 0 0 6 0z"/></svg>
    </div>
    <!-- Finance · featured rupee -->
    <div class="tile featured" title="Finance · Rupee">
      <span class="rupee">₹</span>
    </div>
    <!-- Finance · chart up -->
    <div class="tile" title="Markets">
      <svg viewBox="0 0 24 24" class="draw"><path d="M3 17l6-6 4 4 8-8"/><path d="M14 7h7v7"/></svg>
    </div>
    <!-- Ops · cog -->
    <div class="tile" title="Ops">
      <svg viewBox="0 0 24 24" class="spin"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3M4.9 4.9l2.1 2.1M17 17l2.1 2.1M4.9 19.1L7 17M17 7l2.1-2.1"/></svg>
    </div>
    <!-- Media · broadcast -->
    <div class="tile" title="Media">
      <svg viewBox="0 0 24 24" class="pulse"><circle cx="12" cy="12" r="2"/><path d="M8 8a5.66 5.66 0 0 0 0 8"/><path d="M16 16a5.66 5.66 0 0 0 0-8"/><path d="M5 5a9.9 9.9 0 0 0 0 14"/><path d="M19 19a9.9 9.9 0 0 0 0-14"/></svg>
    </div>
    <!-- Surveys · clipboard -->
    <div class="tile" title="Surveys">
      <svg viewBox="0 0 24 24" class="draw"><rect x="5" y="4" width="14" height="17" rx="1"/><path d="M9 4V2h6v2"/><path d="M9 10h6M9 14h6M9 18h4"/></svg>
    </div>
    <!-- Tech · cpu -->
    <div class="tile" title="Tech">
      <svg viewBox="0 0 24 24" class="pulse"><rect x="6" y="6" width="12" height="12" rx="1"/><rect x="9" y="9" width="6" height="6"/><path d="M9 3v3M15 3v3M9 18v3M15 18v3M3 9h3M3 15h3M18 9h3M18 15h3"/></svg>
    </div>
    <!-- Intelligence · orbit -->
    <div class="tile" title="Intelligence">
      <svg viewBox="0 0 24 24" class="spin"><circle cx="12" cy="12" r="3"/><ellipse cx="12" cy="12" rx="10" ry="4"/></svg>
    </div>
  </div>

  <!-- Row 2: Contact + UI glyphs -->
  <div class="row">
    <div class="tile" title="Location">
      <svg viewBox="0 0 24 24" class="bob"><path d="M12 21s-7-7-7-12a7 7 0 0 1 14 0c0 5-7 12-7 12z"/><circle cx="12" cy="9" r="2.5"/></svg>
    </div>
    <div class="tile" title="Email">
      <svg viewBox="0 0 24 24" class="draw"><rect x="3" y="5" width="18" height="14" rx="1"/><path d="M3 7l9 7 9-7"/></svg>
    </div>
    <div class="tile" title="Phone">
      <svg viewBox="0 0 24 24" class="tilt"><path d="M5 4h3l2 5-2 1a12 12 0 0 0 6 6l1-2 5 2v3a2 2 0 0 1-2 2A16 16 0 0 1 3 6a2 2 0 0 1 2-2z"/></svg>
    </div>
    <div class="tile" title="Document">
      <svg viewBox="0 0 24 24" class="draw"><path d="M7 3h8l4 4v14H7z"/><path d="M15 3v4h4"/><path d="M10 13h6M10 17h6"/></svg>
    </div>
    <div class="tile" title="Secure">
      <svg viewBox="0 0 24 24" class="pulse"><path d="M12 3l8 3v6c0 5-4 8-8 9-4-1-8-4-8-9V6z"/><path d="M9 12l2 2 4-4"/></svg>
    </div>
    <div class="tile" title="Global">
      <svg viewBox="0 0 24 24" class="spin"><circle cx="12" cy="12" r="9"/><path d="M3 12h18"/><path d="M12 3a13 13 0 0 1 0 18a13 13 0 0 1 0-18z"/></svg>
    </div>
    <div class="tile" title="Chat">
      <svg viewBox="0 0 24 24" class="bob"><path d="M4 5h16v11H9l-5 4z"/></svg>
    </div>
    <div class="tile" title="Arrow">
      <svg viewBox="0 0 24 24" class="bob"><path d="M5 12h14"/><path d="M13 6l6 6-6 6"/></svg>
    </div>
  </div>

  <!-- Row 3: Unicode typographic accents -->
  <div class="row">
    <div class="tile uni">✦</div>
    <div class="tile uni">⬡</div>
    <div class="tile uni">◯</div>
    <div class="tile uni">∞</div>
    <div class="tile uni">§</div>
    <div class="tile uni">†</div>
    <div class="tile uni">→</div>
    <div class="tile uni">"</div>
  </div>

  <div class="note">Row 1 · services — <span>₹ featured for finance</span>, hairline SVG with ambient motion · Row 2 · UI + contact · Row 3 · unicode accents in gold</div>
</div>
</body></html>
