<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Chat Bubble</title>
<style>
.card { padding: 22px 26px; }
.panel { background: #0d0d0d; border: 1px solid rgba(200,169,110,0.25); display: flex; flex-direction: column; margin-top: 12px; box-shadow: 0 24px 80px rgba(0,0,0,0.7); }
.head { padding: 12px 16px; border-bottom: 1px solid rgba(200,169,110,0.12); display: flex; align-items: center; gap: 10px; }
.av { width: 28px; height: 28px; border-radius: 50%; background: linear-gradient(135deg, #1a3a5c, #8b2635); display: flex; align-items: center; justify-content: center; font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 800; color: #fff; }
.ht h4 { font-family: 'Syne', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: #e8d5a3; margin: 0; }
.ht p { font-family: 'Space Mono', monospace; font-size: 7px; color: #8a7d6a; letter-spacing: 1px; margin: 2px 0 0; }
.msgs { padding: 14px 16px; display: flex; flex-direction: column; gap: 8px; }
.msg { max-width: 82%; padding: 9px 12px; line-height: 1.5; font-family: 'Cormorant Garamond', serif; font-size: 13px; }
.ai { background: rgba(26,58,92,0.3); border: 1px solid rgba(26,58,92,0.5); color: rgba(245,240,232,0.9); align-self: flex-start; border-radius: 0 8px 8px 8px; }
.me { background: rgba(200,169,110,0.1); border: 1px solid rgba(200,169,110,0.25); color: #e8d5a3; align-self: flex-end; border-radius: 8px 0 8px 8px; }
.nm { font-family: 'Space Mono', monospace; font-size: 7px; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; opacity: 0.6; }
</style></head><body>
<div class="card">
  <div class="eyebrow">Chat Bubbles · AI navy, user gold</div>
  <div class="panel">
    <div class="head"><div class="av">0</div><div class="ht"><h4>Shoonyapurna AI</h4><p>In-House Intelligence · Limited Rollout</p></div></div>
    <div class="msgs">
      <div class="msg ai"><div class="nm">Shoonyapurna AI</div>Namaste! I'm the in-house AI. How can I assist?</div>
      <div class="msg me"><div class="nm">You</div>Tell me about legal intelligence.</div>
    </div>
  </div>
</div>
</body></html>
