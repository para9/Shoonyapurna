<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Type — Scale</title>
<style>
.card { padding: 24px 28px; }
.row { display: grid; grid-template-columns: 90px 1fr 160px; align-items: baseline; gap: 16px; padding: 10px 0; border-bottom: 1px solid rgba(200,169,110,0.08); }
.row:last-child { border: none; }
.token { font-family: 'Space Mono', monospace; font-size: 9px; letter-spacing: 1.5px; color: #c8a96e; text-transform: uppercase; }
.sample { font-family: 'Cormorant Garamond', serif; color: #f5f0e8; font-weight: 300; line-height: 1; }
.note { font-family: 'Space Mono', monospace; font-size: 8px; color: #8a7d6a; letter-spacing: 1.5px; text-transform: uppercase; text-align: right; }
</style></head><body>
<div class="card">
  <div class="eyebrow" style="margin-bottom: 10px;">Type Scale · serif display ladder</div>
  <div class="row"><div class="token">hero</div><div class="sample" style="font-size:44px">Aa — Shoonya</div><div class="note">28 → 52px · clamp</div></div>
  <div class="row"><div class="token">6xl</div><div class="sample" style="font-size:36px">Section title</div><div class="note">32 → 56 · clamp</div></div>
  <div class="row"><div class="token">3xl</div><div class="sample" style="font-size:28px">Quote name</div><div class="note">28px · italic 300</div></div>
  <div class="row"><div class="token">2xl</div><div class="sample" style="font-size:22px">Card heading</div><div class="note">22px · 400</div></div>
  <div class="row"><div class="token">xl / lg</div><div class="sample" style="font-size:18px">Body prose — 18/16</div><div class="note">18 body · 16 card</div></div>
  <div class="row"><div class="token">base</div><div class="sample" style="font-size:15px">Form field input text</div><div class="note">15px · 400</div></div>
</div>
</body></html>
