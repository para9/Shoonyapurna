<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Eyebrow & Divider</title>
<style>
.card { padding: 26px 28px; }
.eb-demo { display: flex; align-items: center; gap: 14px; margin: 14px 0; }
.eb-demo::after { content: ''; flex: 1; height: 1px; background: linear-gradient(to right, rgba(200,169,110,0.4), transparent); }
.eb-text { font-family: 'Space Mono', monospace; font-size: 9px; letter-spacing: 4px; text-transform: uppercase; color: #c8a96e; }
.h2 { font-family: 'Cormorant Garamond', serif; font-size: 36px; font-weight: 300; color: #f5f0e8; line-height: 1.15; }
.h2 em { font-style: italic; color: #e8d5a3; }
.pair { margin-bottom: 18px; }
.pair:last-child { margin-bottom: 0; }
</style></head><body>
<div class="card">
  <div class="eyebrow" style="margin-bottom: 6px;">Section Headers · eyebrow + hairline fade</div>
  <div class="pair">
    <div class="eb-demo"><span class="eb-text">What We Do</span></div>
    <div class="h2">Every domain. <em>One address.</em></div>
  </div>
  <div class="pair">
    <div class="eb-demo"><span class="eb-text">Who We Are</span></div>
    <div class="h2">From zero, <em>we build.</em></div>
  </div>
</div>
</body></html>
