<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Alpha Tokens</title>
<style>
.card { padding: 26px 28px; }
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; margin-top: 14px; }
.stack-col { display: flex; flex-direction: column; gap: 6px; }
.lbl { font-family: var(--font-mono); font-size: 8px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
.bar { display: flex; align-items: center; gap: 10px; }
.chip { width: 40px; height: 20px; border: 1px solid rgba(200,169,110,0.08); }
.chip.paper-bg { background: #f5f0e8; }
.val { font-family: var(--font-mono); font-size: 10px; color: var(--paper); letter-spacing: 1px; }
.val .name { color: var(--gold); margin-right: 8px; }
</style></head><body>
<div class="card">
  <div class="eyebrow" style="margin-bottom:14px;">Alpha Tokens · gold strokes & paper text on ink</div>
  <div class="grid">
    <div class="stack-col">
      <div class="lbl">Gold on Ink</div>
      <div class="bar"><div class="chip" style="background:rgba(200,169,110,0.40)"></div><div class="val"><span class="name">gold-40</span>0.40</div></div>
      <div class="bar"><div class="chip" style="background:rgba(200,169,110,0.25)"></div><div class="val"><span class="name">gold-25</span>0.25</div></div>
      <div class="bar"><div class="chip" style="background:rgba(200,169,110,0.18)"></div><div class="val"><span class="name">gold-18</span>0.18</div></div>
      <div class="bar"><div class="chip" style="background:rgba(200,169,110,0.12)"></div><div class="val"><span class="name">gold-12</span>0.12</div></div>
      <div class="bar"><div class="chip" style="background:rgba(200,169,110,0.08)"></div><div class="val"><span class="name">gold-08</span>0.08</div></div>
    </div>
    <div class="stack-col">
      <div class="lbl">Paper on Ink</div>
      <div class="bar"><div class="chip paper-bg" style="opacity:0.9"></div><div class="val"><span class="name">paper-90</span>body</div></div>
      <div class="bar"><div class="chip paper-bg" style="opacity:0.8"></div><div class="val"><span class="name">paper-80</span>prose</div></div>
      <div class="bar"><div class="chip paper-bg" style="opacity:0.7"></div><div class="val"><span class="name">paper-70</span>card</div></div>
      <div class="bar"><div class="chip paper-bg" style="opacity:0.6"></div><div class="val"><span class="name">paper-60</span>nav</div></div>
      <div class="bar"><div class="chip paper-bg" style="opacity:0.3"></div><div class="val"><span class="name">paper-30</span>placeholder</div></div>
    </div>
  </div>
</div>
</body></html>
